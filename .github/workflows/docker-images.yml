name: Build Jenkins PHP JNLP Slave Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 2' # Every Tuesday at 06:00 UTC

jobs:
  build_images:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        include:
          - php_version: '8.4'
            is_latest: true
          - php_version: '8.3'
            is_latest: false
          - php_version: '8.2'
            is_latest: false
          - php_version: '8.1'
            is_latest: false
          - php_version: '8.0'
            is_latest: false
          - php_version: '7.4'
            is_latest: false
          - php_version: '7.3'
            is_latest: false
          - php_version: '7.2'
            is_latest: false
          - php_version: '7.1'
            is_latest: false
          - php_version: '7.0'
            is_latest: false
          - php_version: '5.6'
            is_latest: false

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # BUILD AMD64 IMAGE FOR TESTING
      - name: Build Image - amd64
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          tags: |
            fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-amd64

      - name: Test image - amd64
        run: |
          docker run --rm --platform=linux/amd64 --entrypoint java fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-amd64 -version
          docker run --rm --platform=linux/amd64 --entrypoint java fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-amd64 -jar /usr/share/jenkins/agent.jar -version
          docker run --rm --platform=linux/amd64 --entrypoint symfony fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-amd64 -V
          docker run --rm --platform=linux/amd64 --entrypoint composer fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-amd64 -V
          docker run --rm --platform=linux/amd64 --entrypoint php fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-amd64 -m | grep -i xdebug
          docker run --rm --platform=linux/amd64 --entrypoint whoami fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-amd64 | grep -q jenkins

      # BUILD ARM64 IMAGE FOR TESTING
      - name: Build Image - arm64
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64
          context: .
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          tags: |
            fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-arm64

      - name: Test image - arm64
        run: |
          docker run --rm --platform=linux/arm64 --entrypoint java fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-arm64 -version
          docker run --rm --platform=linux/arm64 --entrypoint java fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-arm64 -jar /usr/share/jenkins/agent.jar -version
          docker run --rm --platform=linux/arm64 --entrypoint symfony fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-arm64 -V
          docker run --rm --platform=linux/arm64 --entrypoint composer fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-arm64 -V
          docker run --rm --platform=linux/arm64 --entrypoint php fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-arm64 -m | grep -i xdebug
          docker run --rm --platform=linux/arm64 --entrypoint whoami fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}-arm64 | grep -q jenkins

      # LOGIN & PUSH MULTI-ARCH IMAGE
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Images
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          tags: |
            fbraz3/jenkins-php-jnlp-slave:${{ matrix.php_version }}
            ${{ matrix.is_latest && 'fbraz3/jenkins-php-jnlp-slave:latest' || '' }}
